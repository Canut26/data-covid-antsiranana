version: "3.9"

services:

  # ── Streamlit Dashboard ──────────────────────────────────────────────────
  app:
    build: .
    container_name: covid_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro          # données en lecture seule
      - ./figures:/app/figures       # figures générées
      - ./reports:/app/reports       # rapports CSV
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Jupyter Notebook (développement) ────────────────────────────────────
  jupyter:
    build: .
    container_name: covid_jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    profiles:
      - dev   # lancé uniquement avec: docker compose --profile dev up

volumes:
  data:
